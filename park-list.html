<!doctype html><html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>园区载体管理 · 武汉大学产业创新AI智脑平台</title>
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="assets/js/lucide.min.js"></script>
</head>
<body data-theme="light" data-page="park-list">
<main class="wuda-view">
  <div class="page-head">
    <div>
      <div class="page-title"><span class="accentbar"></span>园区载体管理</div>
      <div class="page-sub">大学科技园 · 孵化器 · 加速器 · 异地协同载体 全要素空间运营一张图</div>
    </div>
    <div style="display:flex;gap:9px">
      <button class="btn" id="btnMap"><i data-lucide="map"></i> 载体分布</button>
      <button class="btn btn-primary" id="btnNew">＋ 新增入驻申请</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid cols-4" id="kpis"></div>

  <!-- 园区卡片网格 -->
  <div class="panel mt-4">
    <div class="panel-h"><div class="t"><span class="bar"></span>园区载体一览</div>
      <div class="tools"><span class="panel-tag" id="parkCnt"></span></div></div>
    <div class="grid cols-3 stagger" id="parkGrid"></div>
  </div>

  <!-- 对比图表 -->
  <div class="grid cols-2 mt-4">
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>各园区出租率对比</div>
        <div class="tools"><span class="panel-tag">含警戒线 70%</span></div></div>
      <div class="chart h340" id="occBar"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>各园区入驻企业数</div>
        <div class="tools"><span class="panel-tag">在管主体</span></div></div>
      <div class="chart h340" id="entBar"></div>
    </div>
  </div>

  <div id="srcNote"></div>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/shell.js"></script>
<script>(function(){
  const parks = DB.parks;

  // ---------- KPI ----------
  const totalArea = parks.reduce((s,p)=>s+p.area,0);
  const totalEnts = parks.reduce((s,p)=>s+p.ents,0);
  const avgOcc = Math.round(parks.reduce((s,p)=>s+p.occupancy,0)/parks.length);
  const totalSvc = parks.reduce((s,p)=>s+p.services,0);
  document.getElementById('kpis').innerHTML=[
    UI.kpi({label:'在管园区载体',value:parks.length,unit:'个',icon:'<i data-lucide="building"></i>',delta:'国家级2',deltaUp:true}),
    UI.kpi({label:'在管载体面积',value:totalArea.toFixed(1),unit:'万㎡',icon:'<i data-lucide="ruler"></i>',spark:[18,27,33,41,46,52,58,62]}),
    UI.kpi({label:'累计入驻企业',value:totalEnts,unit:'家',icon:'<i data-lucide="building-2"></i>',delta:'4.6%',deltaUp:true}),
    UI.kpi({label:'平均出租率',value:avgOcc,unit:'%',icon:'<i data-lucide="bar-chart-3"></i>',delta:'2.1%',deltaUp:true}),
  ].join('');

  // ---------- 级别 / 类型徽章 ----------
  const levelTag = lv => UI.tag(lv, {'国家级':'green','省级':'blue','市级':'amber'}[lv]||'gray');
  const occColor = o => o>=85?'var(--success)':o>=72?'var(--primary)':'var(--warning)';

  // ---------- 园区卡片网格 ----------
  document.getElementById('parkCnt').textContent = parks.length+' 个载体';
  document.getElementById('parkGrid').innerHTML = parks.map(p=>`
    <a class="ecard" href="park-detail.html?id=${p.id}" style="text-decoration:none;display:block">
      <div class="flex justify-between items-center" style="gap:10px">
        <div class="et" style="flex:1;min-width:0;white-space:normal;line-height:1.4">${p.name}</div>
        ${levelTag(p.level)}
      </div>
      <div class="em mt-2" style="display:flex;gap:8px;flex-wrap:wrap">
        ${UI.tag(p.type,'gray')}<span class="text-mute f12"><i data-lucide="map-pin"></i> ${p.addr}</span>
      </div>
      <div class="mt-3 flex justify-between items-center">
        <span class="f12 text-mute">出租率</span>
        <span class="num fw7" style="color:${occColor(p.occupancy)}">${p.occupancy}%</span>
      </div>
      ${UI.bar(p.occupancy, occColor(p.occupancy))}
      <div class="grid cols-3 mt-3" style="gap:8px;text-align:center">
        <div><div class="num fw7 f18">${p.area}</div><div class="f12 text-mute">面积万㎡</div></div>
        <div><div class="num fw7 f18 text-primary">${p.ents}</div><div class="f12 text-mute">入驻企业</div></div>
        <div><div class="num fw7 f18">${p.services}</div><div class="f12 text-mute">服务事项</div></div>
      </div>
      <div class="divider"></div>
      <div class="flex justify-between items-center">
        <span class="f12 text-mute">楼宇 ${p.buildings} 栋</span>
        <span class="fw7" style="color:var(--success)">年收入 ${(p.revenue/10000).toFixed(2)} 亿</span>
      </div>
      <div class="mt-2 text-primary f12" style="text-align:right">进入园区驾驶舱 →</div>
    </a>`).join('');

  // ---------- 出租率对比柱状 ----------
  const shortName = p => p.name.replace('武汉大学','武大').replace('（主园区）','').replace('·','');
  Charts.init('occBar', {
    grid:{left:8,right:20,top:18,bottom:6,containLabel:true},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:p=>`${p[0].name}<br/>出租率: ${p[0].value}%`},
    xAxis:{type:'category',data:parks.map(shortName),axisLabel:{interval:0,rotate:18,fontSize:10}},
    yAxis:{type:'value',max:100,axisLabel:{formatter:'{value}%'}},
    series:[{
      type:'bar',barMaxWidth:34,data:parks.map(p=>({value:p.occupancy,
        itemStyle:{borderRadius:[5,5,0,0],color:Charts.grad(occColor(p.occupancy),'rgba(30,58,138,.12)')}})),
      markLine:{silent:true,symbol:'none',lineStyle:{color:'var(--warning)',type:'dashed'},
        data:[{yAxis:70,label:{formatter:'警戒线 70%',color:'var(--warning)',fontSize:11,position:'end'}}]},
      label:{show:true,position:'top',formatter:'{c}%',fontSize:11,color:'var(--text-dim)'}
    }]
  });

  // ---------- 入驻企业数柱状 ----------
  Charts.init('entBar',{
    grid:{left:8,right:20,top:18,bottom:6,containLabel:true},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
    xAxis:{type:'category',data:parks.map(shortName),axisLabel:{interval:0,rotate:18,fontSize:10}},
    yAxis:{type:'value'},
    series:[{type:'bar',barMaxWidth:34,data:parks.map(p=>p.ents),
      itemStyle:{borderRadius:[5,5,0,0],color:Charts.grad('#2b50b8','rgba(43,80,184,.12)')},
      label:{show:true,position:'top',fontSize:11,color:'var(--text-dim)'}}]
  });

  // ---------- 操作 ----------
  document.getElementById('btnNew').onclick=()=>{
    UI.modal('＋ 新增入驻申请', `
      <div class="text-dim mb-3 f13">填写企业基本信息，系统将自动派单至对应园区招商团队并进入入驻评审流程。</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div class="f12 text-mute mb-2">企业名称</div><input type="text" placeholder="如：珞珈智能科技有限公司" style="width:100%"></div>
        <div><div class="f12 text-mute mb-2">学科方向</div><select style="width:100%">${DB.disciplines.map(d=>`<option>${d.name}</option>`).join('')}</select></div>
        <div><div class="f12 text-mute mb-2">意向园区</div><select style="width:100%">${DB.parks.map(p=>`<option>${p.name}</option>`).join('')}</select></div>
        <div><div class="f12 text-mute mb-2">需求面积(㎡)</div><input type="text" placeholder="如：200"></div>
      </div>`,
      {footer:`<button class="btn btn-sm" onclick="UI.closeModal()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="UI.closeModal();UI.toast('入驻申请已提交，已派单至招商团队','ok')">提交申请</button>`});
  };
  document.getElementById('btnMap').onclick=()=>{
    UI.drawer('<i data-lucide="map"></i> 载体空间分布', `
      <div class="text-dim mb-3 f13">武汉大学产业创新载体覆盖东湖高新区、武汉经开区、洪山区及襄阳异地协同节点。</div>
      ${parks.map(p=>`<div class="ecard mb-3" style="cursor:pointer" onclick="location.href='park-detail.html?id=${p.id}'">
        <div class="flex justify-between items-center"><div class="et">${p.name}</div>${levelTag(p.level)}</div>
        <div class="em mt-2"><i data-lucide="map-pin"></i> ${p.addr} · ${p.type}</div>
        <div class="mt-2 flex gap-3 f12 text-mute"><span>面积 ${p.area} 万㎡</span><span>企业 ${p.ents} 家</span><span style="color:${occColor(p.occupancy)}">出租率 ${p.occupancy}%</span></div>
      </div>`).join('')}`, {width:'520px'});
  };

  document.getElementById('srcNote').innerHTML = UI.srcNote(['科技园与创意园','参股/校属企业','产业企业与园区']);
})();</script>
</body></html>
