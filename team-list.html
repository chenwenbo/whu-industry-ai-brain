<!doctype html><html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>团队与科研组织 · 武汉大学产业创新AI智脑平台</title>
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="assets/js/lucide.min.js"></script>
</head>
<body data-theme="light" data-page="team-list">
<main class="wuda-view">
  <div class="page-head">
    <div>
      <div class="page-title"><span class="accentbar"></span>团队与科研组织</div>
      <div class="page-sub">汇聚五大优势学科科研团队与PI，按学科 / 学院 / 层级筛选，识别可对接产业需求与高潜转化团队</div>
    </div>
    <div style="display:flex;gap:9px">
      <button class="btn btn-sm" id="btnExport">⤓ 导出团队清单</button>
      <button class="btn btn-primary btn-sm" id="btnMatch"><i data-lucide="bot"></i> AI团队-需求匹配</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid cols-4" id="kpis"></div>

  <!-- 学科分布 + 层级分布 -->
  <div class="grid cols-2 mt-4">
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>学科团队分布</div><div class="tools"><span class="panel-tag">团队数 / 成果数</span></div></div>
      <div class="chart h300" id="discBar"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>团队层级构成</div><div class="tools"><span class="panel-tag">国家级 / 省部级 / 校级</span></div></div>
      <div class="chart h300" id="rankPie"></div>
    </div>
  </div>

  <!-- 筛选 + 视图 -->
  <div class="panel mt-4">
    <div class="panel-h" style="flex-wrap:wrap;gap:12px">
      <div class="t"><span class="bar"></span>科研团队清单 <span class="tag tag-gray" id="cntTag"></span></div>
      <div class="tools"></div>
    </div>
    <div id="filter"></div>
    <div id="cardView" class="grid cols-3 mt-4"></div>
    <div id="tableView" class="mt-4" style="display:none"></div>
  </div>

  <div id="srcNote"></div>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/shell.js"></script>
<script>(function(){
  const teams=DB.teams;
  const disciplines=DB.disciplines;
  function discColor(id){ return (disciplines.find(d=>d.id===id)||{}).color||'var(--primary)'; }

  // ---------- KPI ----------
  const piCount=teams.length;
  const achSum=teams.reduce((s,t)=>s+t.achievements,0);
  const demandSum=teams.reduce((s,t)=>s+t.demand,0);
  const patentSum=teams.reduce((s,t)=>s+t.patents,0);
  document.getElementById('kpis').innerHTML=[
    UI.kpi({label:'科研团队总数',value:teams.length,unit:'支',delta:'4.6%',deltaUp:true,icon:'<i data-lucide="users"></i>',spark:[14,16,15,18,19,21,20,22,23,24,25,26]}),
    UI.kpi({label:'团队PI / 学术带头人',value:piCount,unit:'人',delta:'3.1%',deltaUp:true,icon:'<i data-lucide="graduation-cap"></i>',spark:[14,15,16,17,18,20,21,22,23,24,25,26]}),
    UI.kpi({label:'团队成果合计',value:achSum,unit:'项',delta:'9.2%',deltaUp:true,icon:'<i data-lucide="microscope"></i>',spark:[120,140,160,180,200,230,250,270,290,310,330,achSum]}),
    UI.kpi({label:'可对接产业需求',value:demandSum,unit:'项',delta:'12.4%',deltaUp:true,icon:'<i data-lucide="handshake"></i>',spark:[18,22,26,30,35,40,46,52,58,64,70,demandSum]}),
  ].join('');

  // ---------- 学科团队分布(双系列:团队数/成果数) ----------
  Charts.bar('discBar',{
    x:disciplines.map(d=>d.name),
    series:[
      {name:'团队数',data:disciplines.map(d=>teams.filter(t=>t.discipline===d.id).length)},
      {name:'成果数',data:disciplines.map(d=>teams.filter(t=>t.discipline===d.id).reduce((s,t)=>s+t.achievements,0))},
    ],
    legend:true
  });

  // ---------- 层级分布 ----------
  const ranks=['国家级','省部级','校级重点'];
  Charts.pie('rankPie',{
    data:ranks.map(r=>({name:r,value:teams.filter(t=>t.rank===r).length})),
    ring:true,legend:true,center:['38%','52%']
  });

  // ---------- 视图状态 ----------
  let view='card', cur=teams.slice();
  const segHtml=`<div class="seg" id="segView" style="margin-left:auto"><button data-v="card" class="on">▦ 卡片</button><button data-v="table">▤ 表格</button></div>`;

  function rankTag(r){ const map={'国家级':'red','省部级':'amber','校级重点':'blue'}; return UI.tag(r,map[r]||'gray'); }

  // ---------- 筛选 ----------
  UI.filterBar('#filter',{
    fields:[
      {key:'disc',label:'全部学科',options:disciplines.map(d=>d.name)},
      {key:'college',label:'全部学院',options:[...new Set(teams.map(t=>t.college))]},
      {key:'rank',label:'全部层级',options:ranks},
    ],
    search:true, searchPh:'搜索团队名称 / PI / 研究方向...',
    extra:segHtml,
    onChange:vals=>apply(vals)
  });

  function apply(v){
    cur=teams.filter(t=>{
      if(v.disc && t.disciplineName!==v.disc) return false;
      if(v.college && t.college!==v.college) return false;
      if(v.rank && t.rank!==v.rank) return false;
      if(v._q){
        const q=v._q.toLowerCase();
        const hay=(t.name+t.pi+t.field+t.disciplineName+t.college).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    document.getElementById('cntTag').textContent='共 '+cur.length+' 支';
    if(view==='card') renderCards(); else tbl.update(cur);
  }

  // ---------- 卡片视图 ----------
  function renderCards(){
    const wrap=document.getElementById('cardView');
    if(!cur.length){ wrap.innerHTML=UI.empty('未匹配到团队，试试调整筛选条件'); return; }
    wrap.innerHTML=cur.map(t=>{
      const c=discColor(t.discipline);
      const meta=`
        <div style="display:flex;flex-direction:column;gap:6px">
          <div class="flex items-center gap-2">
            <span class="av" style="width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff;background:linear-gradient(135deg,${c},color-mix(in srgb,${c} 55%,#fff))">${t.pi.slice(0,1)}</span>
            <div><div class="fw6 f13">PI ${t.pi}</div><div class="f12 text-mute">${t.college}</div></div>
          </div>
          <div class="flex items-center gap-2" style="margin-top:2px">
            <span style="font-size:11px;border:1px solid ${c};color:${c};border-radius:6px;padding:1px 7px;font-weight:600">${t.disciplineName}</span>
            <span class="f12 text-mute">${t.field}</span>
          </div>
          <div class="grid cols-4" style="gap:6px;margin-top:6px;text-align:center">
            <div><div class="num fw7 f13">${t.members}</div><div class="f12 text-mute">成员</div></div>
            <div><div class="num fw7 f13" style="color:var(--primary)">${t.achievements}</div><div class="f12 text-mute">成果</div></div>
            <div><div class="num fw7 f13">${t.patents}</div><div class="f12 text-mute">专利</div></div>
            <div><div class="num fw7 f13" style="color:var(--success)">${t.transferred}</div><div class="f12 text-mute">已转化</div></div>
          </div>
          <div class="flex items-center gap-2" style="margin-top:5px">
            <span class="f12 text-mute" style="white-space:nowrap">可对接需求</span>
            <span class="tag tag-amber">${t.demand} 项</span>
          </div>
        </div>`;
      return UI.entityCard({
        title:t.name,
        meta, tags:[],
        badge:rankTag(t.rank),
        onclick:`location.href='team-detail.html?id=${t.id}'`
      });
    }).join('');
  }

  // ---------- 表格视图 ----------
  const tbl=UI.table('#tableView',{
    columns:[
      {key:'name',title:'团队名称',sortable:false,render:r=>`<div class="fw6">${UI.esc(r.name)}</div><div class="f12 text-mute">${r.id} · ${r.field}</div>`},
      {key:'pi',title:'PI'},
      {key:'disciplineName',title:'学科',render:r=>{const c=discColor(r.discipline);return `<span style="color:${c};font-weight:600">${r.disciplineName}</span>`;}},
      {key:'college',title:'学院'},
      {key:'members',title:'成员',sortVal:r=>r.members,render:r=>`<span class="num">${r.members}</span>`},
      {key:'achievements',title:'成果',sortVal:r=>r.achievements,render:r=>`<span class="num text-primary fw7">${r.achievements}</span>`},
      {key:'patents',title:'专利',sortVal:r=>r.patents,render:r=>`<span class="num">${r.patents}</span>`},
      {key:'transferred',title:'已转化',sortVal:r=>r.transferred,render:r=>`<span class="num fw7" style="color:var(--success)">${r.transferred}</span>`},
      {key:'demand',title:'可对接需求',sortVal:r=>r.demand,render:r=>UI.tag(r.demand+' 项','amber')},
      {key:'rank',title:'层级',render:r=>rankTag(r.rank)},
    ],
    rows:cur, pageSize:12,
    onRow:r=>location.href='team-detail.html?id='+r.id,
    empty:'未匹配到团队'
  });

  // ---------- seg 切换 ----------
  document.getElementById('segView').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    view=b.dataset.v;
    document.getElementById('cardView').style.display = view==='card'?'':'none';
    document.getElementById('tableView').style.display = view==='table'?'':'none';
    if(view==='card') renderCards(); else tbl.update(cur);
  });

  // ---------- 操作 ----------
  document.getElementById('btnExport').onclick=()=>UI.toast('已生成团队清单，共 '+cur.length+' 支团队','ok');
  document.getElementById('btnMatch').onclick=()=>{
    UI.modal('<i data-lucide="bot"></i> AI 团队-产业需求匹配', `
      <div class="text-dim mb-3" style="font-size:13px">将基于当前筛选的 <b class="text-primary">${cur.length}</b> 支团队的研究方向、成果储备与专利布局，调用「AI技术经理人」与产业企业真实需求进行智能匹配。</div>
      <div class="grid cols-2" style="gap:10px">
        <div class="ecard" style="cursor:default"><div class="et f13">匹配维度</div><div class="em mt-2">研究方向 · 成果TRL · 专利 · 转化经验</div></div>
        <div class="ecard" style="cursor:default"><div class="et f13">数据来源</div><div class="em mt-2">学院与团队 · 成果与专利 · 产业企业与园区</div></div>
      </div>`,
      {footer:`<button class="btn btn-sm" onclick="UI.closeModal()">取消</button><button class="btn btn-primary btn-sm" onclick="UI.closeModal();UI.toast('已提交团队匹配任务，可在 AI 工作台查看','ok')">提交匹配任务</button>`});
  };

  apply({});
  document.getElementById('srcNote').innerHTML=UI.srcNote(['学院与团队','成果与专利','产业企业与园区']);
})();</script>
</body></html>
