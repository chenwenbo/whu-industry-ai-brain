<!doctype html><html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>成果库 · 武汉大学产业创新AI智脑平台</title>
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="assets/js/lucide.min.js"></script>
</head>
<body data-theme="light" data-page="achievement-library">
<main class="wuda-view">
  <div class="page-head">
    <div>
      <div class="page-title"><span class="accentbar"></span>成果库 · 成果项目化遴选</div>
      <div class="page-sub">汇聚五大优势学科科技成果，按学科 / 学院 / TRL成熟度 / 转化状态多维筛选，支撑成果遴选与项目化</div>
    </div>
    <div style="display:flex;gap:9px">
      <button class="btn btn-sm" id="btnExport">⤓ 导出清单</button>
      <button class="btn btn-primary btn-sm" id="btnAI"><i data-lucide="bot"></i> AI批量成熟度评估</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid cols-4" id="kpis"></div>

  <!-- 学科分布 + TRL分布 -->
  <div class="grid cols-2 mt-4">
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>学科成果分布</div><div class="tools"><span class="panel-tag">按5大学科</span></div></div>
      <div class="chart h300" id="discPie"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>TRL 成熟度等级分布</div><div class="tools"><span class="panel-tag">TRL 3-8</span></div></div>
      <div class="chart h300" id="trlBar"></div>
    </div>
  </div>

  <!-- 筛选 + 视图切换 -->
  <div class="panel mt-4">
    <div class="panel-h" style="flex-wrap:wrap;gap:12px">
      <div class="t"><span class="bar"></span>成果清单 <span class="tag tag-gray" id="cntTag"></span></div>
      <div class="tools"></div>
    </div>
    <div id="filter"></div>
    <div id="cardView" class="grid cols-3 mt-4"></div>
    <div id="tableView" class="mt-4" style="display:none"></div>
  </div>

  <div id="srcNote"></div>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/shell.js"></script>
<script>(function(){
  const ach = DB.achievements;
  const disciplines = DB.disciplines;

  // ---------- KPI ----------
  const total = ach.length;
  const converted = ach.filter(a=>a.status==='已转化'||a.status==='已签约').length;
  const poc = ach.filter(a=>a.status==='概念验证'||a.status==='中试放大').length;
  const avgTrl = (ach.reduce((s,a)=>s+a.trl,0)/total).toFixed(1);
  document.getElementById('kpis').innerHTML=[
    UI.kpi({label:'成果总数',value:total,unit:'项',delta:'3.2%',deltaUp:true,icon:'<i data-lucide="microscope"></i>',spark:[28,34,31,40,38,46,52,49,58,61,66,72]}),
    UI.kpi({label:'已转化 / 已签约',value:converted,unit:'项',delta:'12.7%',deltaUp:true,icon:'<i data-lucide="banknote"></i>',spark:[3,5,4,7,9,8,12,14,13,16,18,21]}),
    UI.kpi({label:'概念验证 / 中试中',value:poc,unit:'项',delta:'8.4%',deltaUp:true,icon:'<i data-lucide="flask-conical"></i>',spark:[6,8,7,10,9,12,11,14,16,15,18,20]}),
    UI.kpi({label:'平均技术成熟度',value:avgTrl,unit:'TRL',delta:'0.6',deltaUp:true,icon:'<i data-lucide="trending-up"></i>',spark:[51,52,54,53,55,57,56,58,60,59,61,63]}),
  ].join('');

  // ---------- 学科分布饼 ----------
  Charts.pie('discPie',{
    data:disciplines.map(d=>({name:d.name,value:ach.filter(a=>a.discipline===d.id).length})),
    ring:true,legend:true,center:['38%','52%']
  });

  // ---------- TRL分布柱 ----------
  const trlVals=[3,4,5,6,7,8];
  Charts.bar('trlBar',{
    x:trlVals.map(t=>'TRL '+t),
    series:[{name:'成果数',data:trlVals.map(t=>ach.filter(a=>a.trl===t).length)}]
  });

  // ---------- 视图状态 ----------
  let view='card', cur=ach.slice();

  // seg 切换放在 filterBar 的 extra
  const segHtml = `<div class="seg" id="segView" style="margin-left:auto">
    <button data-v="card" class="on">▦ 卡片</button><button data-v="table">▤ 表格</button></div>`;

  // 状态徽章
  function statusBadge(s){
    const map={'已转化':'green','已签约':'green','中试放大':'blue','概念验证':'purple','已立项':'amber','待评估':'gray'};
    return UI.tag(s, map[s]||'gray');
  }
  function discColor(id){ return (disciplines.find(d=>d.id===id)||{}).color||'var(--primary)'; }

  // ---------- 筛选条 ----------
  const fb = UI.filterBar('#filter',{
    fields:[
      {key:'disc',label:'全部学科',options:disciplines.map(d=>d.name)},
      {key:'college',label:'全部学院',options:[...new Set(ach.map(a=>a.college))]},
      {key:'trl',label:'全部成熟度',options:['TRL 3-4 (基础)','TRL 5-6 (中试)','TRL 7-8 (产业化)']},
      {key:'status',label:'全部状态',options:DB.util.picks?['待评估','已立项','概念验证','中试放大','已签约','已转化']:[]},
    ],
    search:true, searchPh:'搜索成果标题 / 负责人 / 关键词...',
    extra:segHtml,
    onChange:vals=>apply(vals)
  });

  function apply(v){
    cur = ach.filter(a=>{
      if(v.disc && a.disciplineName!==v.disc) return false;
      if(v.college && a.college!==v.college) return false;
      if(v.status && a.status!==v.status) return false;
      if(v.trl){
        if(v.trl.startsWith('TRL 3-4') && !(a.trl<=4)) return false;
        if(v.trl.startsWith('TRL 5-6') && !(a.trl>=5&&a.trl<=6)) return false;
        if(v.trl.startsWith('TRL 7-8') && !(a.trl>=7)) return false;
      }
      if(v._q){
        const q=v._q.toLowerCase();
        const hay=(a.title+a.leader+a.scenes.join('')+a.disciplineName).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    document.getElementById('cntTag').textContent='共 '+cur.length+' 项';
    if(view==='card') renderCards(); else tbl.update(cur);
  }

  // ---------- 卡片视图 ----------
  function renderCards(){
    const wrap=document.getElementById('cardView');
    if(!cur.length){ wrap.innerHTML=UI.empty('未匹配到成果，试试调整筛选条件'); return; }
    wrap.innerHTML=cur.map(a=>{
      const c=discColor(a.discipline);
      const meta=`
        <div style="display:flex;flex-direction:column;gap:5px">
          <div><span class="text-mute">学院</span> <span class="fw6">${a.college}</span></div>
          <div><span class="text-mute">负责人</span> <span class="fw6">${a.leader}</span> · <span class="text-mute">${a.year}年</span></div>
          <div class="flex items-center gap-3" style="margin-top:3px">
            <span style="font-size:11px;border:1px solid ${c};color:${c};border-radius:6px;padding:1px 7px;font-weight:600">${a.disciplineName}</span>
            <span class="num text-primary fw7" style="font-size:13px">TRL ${a.trl}</span>
            <span class="num fw7" style="font-size:13px;color:var(--success)">¥${(a.value/10000).toFixed(2)}亿估值</span>
          </div>
          <div class="flex items-center gap-2" style="margin-top:6px">
            <span class="f12 text-mute" style="white-space:nowrap">场景匹配</span>
            <div style="flex:1">${UI.bar(a.match,c)}</div>
            <span class="num fw7 f12" style="color:${c}">${a.match}%</span>
          </div>
        </div>`;
      return UI.entityCard({
        title:a.title,
        meta, tags:a.scenes,
        badge:statusBadge(a.status),
        onclick:`location.href='achievement-detail.html?id=${a.id}'`
      });
    }).join('');
  }

  // ---------- 表格视图 ----------
  const tbl = UI.table('#tableView',{
    columns:[
      {key:'title',title:'成果名称',sortable:false,render:r=>`<div class="fw6">${UI.esc(r.title)}</div><div class="f12 text-mute">${r.id}</div>`},
      {key:'disciplineName',title:'学科',render:r=>{const c=discColor(r.discipline);return `<span style="color:${c};font-weight:600">${r.disciplineName}</span>`;}},
      {key:'college',title:'学院'},
      {key:'leader',title:'负责人'},
      {key:'trl',title:'TRL',sortVal:r=>r.trl,render:r=>`<span class="num text-primary fw7">${r.trl}</span>`},
      {key:'patents',title:'专利',sortVal:r=>r.patents,render:r=>`<span class="num">${r.patents}</span>`},
      {key:'match',title:'匹配度',sortVal:r=>r.match,render:r=>`<div class="flex items-center gap-2"><div style="width:54px">${UI.bar(r.match)}</div><span class="num f12">${r.match}%</span></div>`},
      {key:'value',title:'估值(万)',sortVal:r=>r.value,render:r=>`<span class="num fw7" style="color:var(--success)">${r.value.toLocaleString()}</span>`},
      {key:'status',title:'状态',render:r=>statusBadge(r.status)},
    ],
    rows:cur, pageSize:12,
    onRow:r=>location.href='achievement-detail.html?id='+r.id,
    empty:'未匹配到成果'
  });

  // ---------- seg 视图切换 ----------
  document.getElementById('segView').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    view=b.dataset.v;
    document.getElementById('cardView').style.display = view==='card'?'':'none';
    document.getElementById('tableView').style.display = view==='table'?'':'none';
    if(view==='card') renderCards(); else tbl.update(cur);
  });

  // ---------- 操作按钮 ----------
  document.getElementById('btnExport').onclick=()=>UI.toast('已生成成果清单，共 '+cur.length+' 项，导出至下载列表','ok');
  document.getElementById('btnAI').onclick=()=>{
    UI.modal('AI 批量成熟度评估', `
      <div class="text-dim mb-3">将对当前筛选的 <b class="text-primary">${cur.length}</b> 项成果调用「AI技术经理人」执行 TRL 评估与转化路径建议，预计耗时约 ${Math.ceil(cur.length/6)} 分钟。</div>
      <div class="grid cols-2" style="gap:10px">
        <div class="ecard" style="cursor:default"><div class="et f13">评估维度</div><div class="em mt-2">技术 · 市场 · 团队 · 工艺 · 知识产权</div></div>
        <div class="ecard" style="cursor:default"><div class="et f13">数据来源</div><div class="em mt-2">成果与专利 · 研究院与平台</div></div>
      </div>`,
      {footer:`<button class="btn btn-sm" onclick="UI.closeModal()">取消</button><button class="btn btn-primary btn-sm" onclick="UI.closeModal();UI.toast('已提交 AI 评估任务，可在 AI 工作台查看进度','ok')">提交评估任务</button>`});
  };

  // 初次渲染
  apply({});

  document.getElementById('srcNote').innerHTML = UI.srcNote(['成果与专利','学院与团队','研究院与平台']);
})();</script>
</body></html>
