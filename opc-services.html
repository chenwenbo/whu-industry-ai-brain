<!doctype html><html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OPC线上服务菜单 · 武汉大学产业创新AI智脑平台</title>
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="assets/js/lucide.min.js"></script>
</head>
<body data-theme="light" data-page="opc-services">
<main class="wuda-view">
  <div class="page-head">
    <div>
      <div class="page-title"><span class="accentbar"></span>OPC 线上服务菜单</div>
      <div class="page-sub">面向项目方与企业的标准化产业创新服务超市：成果项目化、企业服务、产业分析、专业服务、资本协同一键下单</div>
    </div>
    <div style="display:flex;gap:9px">
      <a class="btn btn-sm" href="opc-community.html">返回社区</a>
      <button class="btn btn-primary btn-sm" id="btnOrders"><i data-lucide="clipboard-list"></i> 我的订单</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="grid cols-4" id="kpis"></div>

  <!-- 服务商品卡 -->
  <div class="panel mt-4">
    <div class="panel-h" style="flex-wrap:wrap;gap:12px">
      <div class="t"><span class="bar"></span>服务商品</div>
      <div class="tools"><span class="panel-tag" id="catTag"></span></div>
    </div>
    <div id="catBar" class="seg mt-2" style="flex-wrap:wrap"></div>
    <div class="grid cols-4 mt-4" id="svcGrid"></div>
  </div>

  <!-- 图表 -->
  <div class="grid cols-2 mt-4">
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>服务类别分布</div><div class="tools"><span class="panel-tag">按SKU收入</span></div></div>
      <div class="chart h300" id="catPie"></div>
    </div>
    <div class="panel">
      <div class="panel-h"><div class="t"><span class="bar"></span>服务销量榜</div><div class="tools"><span class="panel-tag">累计销量</span></div></div>
      <div class="chart h300" id="salesBar"></div>
    </div>
  </div>

  <!-- 我的订单 -->
  <div class="panel mt-4">
    <div class="panel-h"><div class="t"><span class="bar"></span>已下单订单 <span class="tag tag-gray" id="ordCnt"></span></div><div class="tools"><span class="panel-tag">下单后实时生成</span></div></div>
    <div id="ordTable" class="mt-3"></div>
  </div>

  <div id="srcNote"></div>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/charts.js"></script>
<script src="assets/js/components.js"></script>
<script src="assets/js/shell.js"></script>
<script>(function(){
  const S = DB.opcServices;

  // ---------- KPI ----------
  const totalSales = S.reduce((s,x)=>s+x.sales,0);
  const revenue = S.reduce((s,x)=>s+x.price*x.sales,0); // 万元
  document.getElementById('kpis').innerHTML=[
    UI.kpi({label:'服务 SKU',value:S.length,unit:'个',delta:'2 个',deltaUp:true,icon:'<i data-lucide="shopping-cart"></i>',spark:[4,5,5,6,6,7,7,8,8,8,8,8]}),
    UI.kpi({label:'累计订单',value:totalSales,unit:'笔',delta:'15.3%',deltaUp:true,icon:'<i data-lucide="package"></i>',spark:[120,160,150,200,220,260,250,300,320,350,380,393]}),
    UI.kpi({label:'服务收入',value:revenue.toFixed(0),unit:'万元',delta:'12.8%',deltaUp:true,icon:'<i data-lucide="banknote"></i>',spark:[20,28,26,35,33,44,52,49,58,61,70,78]}),
    UI.kpi({label:'平均客单价',value:(revenue/totalSales).toFixed(2),unit:'万',delta:'3.1%',deltaUp:true,icon:'<i data-lucide="ticket"></i>',spark:[8,9,8,10,11,10,12,11,13,12,14,13]}),
  ].join('');

  // ---------- 类别 ----------
  const cats=['全部',...new Set(S.map(s=>s.cat))];
  let curCat='全部';
  document.getElementById('catBar').innerHTML=cats.map((c,i)=>`<button data-cat="${UI.esc(c)}" class="${i===0?'on':''}">${UI.esc(c)}</button>`).join('');
  document.getElementById('catBar').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    [...e.currentTarget.children].forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curCat=b.dataset.cat; renderSvc();
  });

  // ---------- 已下单订单(初始来自 DB.taskOrders 取若干，含本地新增) ----------
  const localOrders = DB.taskOrders.slice(0,6).map((o,i)=>({
    id:o.id, svc:o.task, cat:'任务包', price:(+o.amount), qty:1, date:o.date, status:o.status, client:o.client
  }));
  let orderSeq = 100;

  // ---------- 服务卡 ----------
  function renderSvc(){
    const list = curCat==='全部'?S:S.filter(s=>s.cat===curCat);
    document.getElementById('catTag').textContent = list.length+' 个服务';
    const catColor={'成果项目化':'blue','企业服务':'green','产业分析':'purple','专业服务':'amber','资本协同':'red','活动运营':'gray'};
    document.getElementById('svcGrid').innerHTML=list.map(s=>`
      <div class="ecard" style="display:flex;flex-direction:column">
        <div class="flex justify-between items-center">
          <div class="et">${UI.esc(s.name)}</div>
          ${UI.tag(s.cat,catColor[s.cat]||'gray')}
        </div>
        <div class="em mt-2" style="flex:1;line-height:1.6">${UI.esc(s.desc)}</div>
        <div class="flex justify-between items-end mt-3" style="padding-top:10px;border-top:1px solid var(--border)">
          <div><span class="num fw7 text-primary" style="font-size:20px">${s.price}</span><span class="text-mute f12"> 万 / ${s.unit}</span><div class="f12 text-mute">已售 ${s.sales} ${s.unit}</div></div>
          <button class="btn btn-primary btn-sm" data-order="${s.id}">立即下单</button>
        </div>
      </div>`).join('');
    document.querySelectorAll('#svcGrid [data-order]').forEach(b=>{
      b.onclick=(e)=>{e.stopPropagation();orderModal(S.find(x=>x.id===b.dataset.order));};
    });
  }
  renderSvc();

  // ---------- 下单弹窗 ----------
  function orderModal(s){
    UI.modal('确认下单 · '+s.name, `
      <div class="grid cols-2" style="gap:10px;margin-bottom:14px">
        ${UI.entityCard({title:'服务类别',meta:UI.tag(s.cat,'blue'),onclick:''})}
        ${UI.entityCard({title:'单价',meta:`<span class="num fw7 text-primary f18">${s.price}</span> 万 / ${s.unit}`,onclick:''})}
      </div>
      <div class="text-dim mb-3" style="line-height:1.7">${UI.esc(s.desc)}</div>
      ${UI.descList([
        ['服务编号', `<span class="num">${s.id}</span>`],
        ['计价单位', s.unit],
        ['购买数量', `<span class="num fw7">1</span> ${s.unit}`],
        ['预计交付', '3 ~ 7 个工作日'],
        ['应付金额', `<span class="num fw7 text-success f18">${s.price} 万元</span>`],
      ])}`,
      {footer:`<button class="btn btn-sm" onclick="UI.closeModal()">取消</button><button class="btn btn-primary btn-sm" id="confirmOrder">确认下单并支付</button>`});
    document.getElementById('confirmOrder').onclick=()=>{
      orderSeq++;
      const o={id:'ORD-N'+orderSeq, svc:s.name, cat:s.cat, price:s.price, qty:1, date:'2026-06-08', status:'待交付', client:'本机构'};
      localOrders.unshift(o);
      s.sales++;
      UI.closeModal();
      UI.toast('下单成功！订单 '+o.id+' 已生成','ok');
      renderSvc(); renderOrders();
      // 更新收入相关图表数据(销量榜/饼)
      Charts.pie('catPie',catPieData());
    };
  }

  // ---------- 订单表 ----------
  function statusBadge(s){
    const map={'已交付':'green','已结算':'green','交付中':'blue','待交付':'amber'};
    return UI.tag(s,map[s]||'gray');
  }
  let ordTbl;
  function renderOrders(){
    document.getElementById('ordCnt').textContent='共 '+localOrders.length+' 笔';
    if(ordTbl){ ordTbl.update(localOrders); return; }
    ordTbl = UI.table('#ordTable',{
      columns:[
        {key:'id',title:'订单号',sortable:false,render:r=>`<span class="num fw6">${r.id}</span>`},
        {key:'svc',title:'服务名称',sortable:false,render:r=>`<div class="fw6">${UI.esc(r.svc)}</div>`},
        {key:'cat',title:'类别',render:r=>UI.tag(r.cat,'blue')},
        {key:'client',title:'下单方'},
        {key:'price',title:'金额(万)',sortVal:r=>+r.price,render:r=>`<span class="num fw7" style="color:var(--success)">${r.price}</span>`},
        {key:'date',title:'下单日期',render:r=>`<span class="num f12">${r.date}</span>`},
        {key:'status',title:'状态',render:r=>statusBadge(r.status)},
      ],
      rows:localOrders, pageSize:8, empty:'暂无订单，可在上方服务超市下单'
    });
  }
  renderOrders();

  // ---------- 类别饼 ----------
  function catPieData(){
    const byCat={};
    S.forEach(s=>{ byCat[s.cat]=(byCat[s.cat]||0)+s.price*s.sales; });
    return {data:Object.keys(byCat).map(k=>({name:k,value:Math.round(byCat[k])})),ring:true,legend:true,center:['38%','52%']};
  }
  Charts.pie('catPie',catPieData());

  // ---------- 销量榜 ----------
  const sorted=[...S].sort((a,b)=>b.sales-a.sales);
  Charts.bar('salesBar',{
    x:sorted.map(s=>s.name.length>6?s.name.slice(0,6):s.name),
    series:[{name:'销量',data:sorted.map(s=>s.sales)}],
    horizontal:true
  });

  // ---------- 我的订单按钮 ----------
  document.getElementById('btnOrders').onclick=()=>{
    document.getElementById('ordTable').scrollIntoView({behavior:'smooth',block:'center'});
    UI.toast('已定位至订单列表，共 '+localOrders.length+' 笔订单','ok');
  };

  document.getElementById('srcNote').innerHTML = UI.srcNote(['成果与专利','参股/校属企业','活动与赛事']);
})();</script>
</body></html>
